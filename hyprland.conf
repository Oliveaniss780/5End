
# =========================
# BASIC SAFE CONFIG
# =========================

# --- Defaults ---
source=hyprland/execs.conf
source=hyprland/general.conf
source=hyprland/rules.conf
source=hyprland/colors.conf
source=hyprland/keybinds.conf

# --- Custom ---
source=custom/execs.conf
source=custom/general.conf
source=custom/rules.conf
source=custom/keybinds.conf

# --- Monitor & workspace ---
source=workspaces.conf
source=monitors.conf

# --- Shell ---
source=hyprland/shellOverrides/main.conf

# =========================
# VISUAL (VALID)
# =========================

decoration {
    blur {
        enabled = true
        size = 10
        passes = 4
    }

    active_opacity = 0.85
    inactive_opacity = 0.85
}

animations {
    enabled = true

    bezier = smooth, 0.13, 0.99, 0.29, 1.0

    animation = windows, 1, 7, smooth
    animation = fade, 1, 8, smooth
    animation = workspaces, 1, 6, smooth
    animation = border, 1, 10, smooth
}

general {
    border_size = 2
    col.active_border = rgba(8a8a8aee)
    col.inactive_border = rgba(333333aa)
}

# =========================
# KEYBIND
# =========================

bind = SUPER, D, exec, wofi --show drun --allow-imagess
bind = SUPER, RETURN, exec, kitty
